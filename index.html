<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Zelda 3D-Look – Browser-Spiel</title>
    <style>
      :root {
        --bg: #0b1622;
        --panel: #132738;
        --panel-border: #2c4f6b;
        --text: #e8f1f7;
        --accent: #f7d774;
        --accent-2: #76d39b;
        --danger: #ff6d6d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1b3650, var(--bg) 45%);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 1rem;
      }

      .game-shell {
        width: min(96vw, 920px);
        display: grid;
        gap: 0.8rem;
      }

      .hud {
        background: rgba(19, 39, 56, 0.92);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 0.7rem 0.9rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem 1.2rem;
        align-items: center;
        justify-content: space-between;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        align-items: center;
      }

      .stat {
        background: #0e1d2b;
        border: 1px solid #2a475f;
        border-radius: 999px;
        padding: 0.3rem 0.7rem;
        font-size: 0.95rem;
      }

      .stat strong {
        color: var(--accent);
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 12px;
        border: 2px solid var(--panel-border);
        background: #122536;
        image-rendering: pixelated;
        box-shadow: 0 22px 38px rgba(0, 0, 0, 0.42), 0 10px 14px rgba(0, 0, 0, 0.28);
        transform: none;
      }

      .canvas-wrap {
        padding-top: 0.4rem;
      }

      .help {
        margin: 0;
        opacity: 0.92;
        font-size: 0.95rem;
      }

      kbd {
        border: 1px solid #53758f;
        background: #0a1724;
        border-radius: 6px;
        padding: 0.1rem 0.35rem;
        font-weight: 700;
      }

      #message {
        color: var(--accent-2);
      }

      #message.warn {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="game-shell">
      <div class="hud">
        <div class="stats">
          <div class="stat">❤️ Leben: <strong id="hearts">5</strong></div>
          <div class="stat">💎 Rubine: <strong id="rupees">0</strong> / 8</div>
          <div class="stat">👾 Gegner: <strong id="enemies">0</strong></div>
        </div>
        <div class="stat" id="message">Sammle 8 Rubine, besiege Bokoblins mit dem Bogen und erreiche den Tempel!</div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="640" height="416" aria-label="Mini Zelda Spiel"></canvas>
      </div>
      <p class="help">
        Steuerung: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> oder Pfeiltasten bewegen,
        <kbd>Leertaste</kbd> Bogen schießen, <kbd>F</kbd> Masterschwert ziehen/angreifen, <kbd>R</kbd> Neustart.
      </p>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const heartsEl = document.getElementById("hearts");
      const rupeesEl = document.getElementById("rupees");
      const enemiesEl = document.getElementById("enemies");
      const messageEl = document.getElementById("message");

      const TILE = 32;
      const MAP_W = 20;
      const MAP_H = 13;
      const MAX_RUPEES = 8;
      const WORLD_H = MAP_H * TILE;
      const SAFE_SPAWN_ATTEMPTS = 800;

      const COLORS = {
        grass: "#2f8f46",
        grassAlt: "#338b48",
        wall: "#25303c",
        wallTop: "#3e4f62",
        temple: "#d5b35f",
        templeDoor: "#684f27",
        rupee: "#6bf8df",
        link: "#f2d7b0",
        linkHair: "#9b6730",
        linkTunic: "#2e80c9",
        linkHat: "#2c7bc0",
        linkPants: "#4a5a82",
        linkSleeve: "#ead7be",
        enemy: "#cc5757",
        sword: "#f2f2f2",
        shadow: "rgba(0,0,0,0.28)",
        bokoblin: "#d87532",
        bokoblinDark: "#a04a22",
        arrow: "#d9c7a0",
        steel: "#dbe8f3",
        steelDark: "#8da0b3",
      };

      let map = [];

      const keyState = new Set();

      let player;
      let enemies;
      let rupees;
      let invulnerableTimer = 0;
      let arrows;
      let shootCooldown = 0;
      let swordPickup;
      let swordSlashTimer = 0;
      let swordDrawn = false;
      let gameOver = false;
      let win = false;
      let levelWallCount = 0;

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function generateRandomLevel() {
        const reserved = new Set(["1,1", "1,2", "2,1", "2,2", "3,1", "1,3"]);

        for (let attempt = 0; attempt < 140; attempt += 1) {
          const grid = Array.from({ length: MAP_H }, (_, y) =>
            Array.from({ length: MAP_W }, (_, x) => (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1 ? "#" : ".")),
          );

          const wallCount = randInt(8, 34);

          let placedWalls = 0;
          let tries = 0;
          while (placedWalls < wallCount && tries < 600) {
            tries += 1;
            const x = randInt(1, MAP_W - 2);
            const y = randInt(1, MAP_H - 2);
            if (reserved.has(`${x},${y}`)) continue;
            if (grid[y][x] !== ".") continue;
            grid[y][x] = "#";
            placedWalls += 1;
          }

          let templePlaced = false;
          while (!templePlaced) {
            const tx = randInt(1, MAP_W - 2);
            const ty = randInt(1, MAP_H - 2);
            if (reserved.has(`${tx},${ty}`)) continue;
            if (grid[ty][tx] !== ".") continue;
            grid[ty][tx] = "T";
            templePlaced = true;
          }

          if (isLevelReachable(grid)) {
            levelWallCount = placedWalls;
            return grid.map((row) => row.join(""));
          }
        }

        levelWallCount = 0;
        return Array.from({ length: MAP_H }, (_, y) =>
          Array.from({ length: MAP_W }, (_, x) => (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1 ? "#" : ".")).join(""),
        );
      }

      function isLevelReachable(grid) {
        const start = { x: 1, y: 1 };
        const queue = [start];
        const visited = new Set([`${start.x},${start.y}`]);

        while (queue.length > 0) {
          const current = queue.shift();
          if (grid[current.y][current.x] === "T") return true;

          const nextCells = [
            [current.x + 1, current.y],
            [current.x - 1, current.y],
            [current.x, current.y + 1],
            [current.x, current.y - 1],
          ];

          for (const [nx, ny] of nextCells) {
            if (nx < 1 || ny < 1 || nx >= MAP_W - 1 || ny >= MAP_H - 1) continue;
            if (grid[ny][nx] === "#") continue;
            const key = `${nx},${ny}`;
            if (visited.has(key)) continue;
            visited.add(key);
            queue.push({ x: nx, y: ny });
          }
        }

        return false;
      }

      function setMessage(text, warning = false) {
        messageEl.textContent = text;
        messageEl.classList.toggle("warn", warning);
      }

      function tileAt(px, py) {
        const tx = Math.floor(px / TILE);
        const ty = Math.floor(py / TILE);
        if (ty < 0 || ty >= MAP_H || tx < 0 || tx >= MAP_W) return "#";
        return map[ty][tx];
      }

      function isBlocked(px, py) {
        return tileAt(px, py) === "#";
      }

      function canMoveTo(nx, ny, size = 22) {
        const half = size / 2;
        return (
          !isBlocked(nx - half, ny - half) &&
          !isBlocked(nx + half, ny - half) &&
          !isBlocked(nx - half, ny + half) &&
          !isBlocked(nx + half, ny + half)
        );
      }

      function randomWalkablePosition() {
        for (let attempts = 0; attempts < SAFE_SPAWN_ATTEMPTS; attempts += 1) {
          const tx = 1 + Math.floor(Math.random() * (MAP_W - 2));
          const ty = 1 + Math.floor(Math.random() * (MAP_H - 2));
          if (map[ty][tx] !== ".") continue;
          return { x: tx * TILE + TILE / 2, y: ty * TILE + TILE / 2 };
        }

        return { x: TILE * 1.5, y: TILE * 1.5 };
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function resetGame() {
        map = generateRandomLevel();
        player = {
          x: TILE * 1.5,
          y: TILE * 1.5,
          dir: "down",
          speed: 150,
          hp: 5,
          rupees: 0,
          size: 22,
          hasSword: false,
        };

        const enemyCount = randInt(1, 10);
        enemies = Array.from({ length: enemyCount }, () => {
          const pos = randomWalkablePosition();
          return {
            ...pos,
            size: 22,
            speed: 50 + Math.random() * 30,
            dirX: Math.random() > 0.5 ? 1 : -1,
            dirY: Math.random() > 0.5 ? 1 : -1,
            wanderTimer: 0,
            alive: true,
          };
        });

        rupees = Array.from({ length: MAX_RUPEES }, () => ({
          ...randomWalkablePosition(),
          taken: false,
        }));

        invulnerableTimer = 0;
        arrows = [];
        shootCooldown = 0;
        let swordPos = randomWalkablePosition();
        while (dist(swordPos, player) < 110) {
          swordPos = randomWalkablePosition();
        }
        swordPickup = {
          ...swordPos,
          taken: false,
        };
        swordSlashTimer = 0;
        swordDrawn = false;
        gameOver = false;
        win = false;

        setMessage(`Neues Level! ${enemyCount} Bokoblins und ${levelWallCount} Wände warten auf dich.`);
        updateHud();
      }

      function updateHud() {
        heartsEl.textContent = player.hp;
        rupeesEl.textContent = player.rupees;
        enemiesEl.textContent = enemies.filter((e) => e.alive).length;
      }

      function updatePlayer(dt) {
        let mx = 0;
        let my = 0;

        if (keyState.has("arrowup") || keyState.has("w")) {
          my -= 1;
          player.dir = "up";
        }
        if (keyState.has("arrowdown") || keyState.has("s")) {
          my += 1;
          player.dir = "down";
        }
        if (keyState.has("arrowleft") || keyState.has("a")) {
          mx -= 1;
          player.dir = "left";
        }
        if (keyState.has("arrowright") || keyState.has("d")) {
          mx += 1;
          player.dir = "right";
        }

        if (mx !== 0 || my !== 0) {
          const len = Math.hypot(mx, my);
          mx /= len;
          my /= len;
        }

        const nx = player.x + mx * player.speed * dt;
        const ny = player.y + my * player.speed * dt;

        if (canMoveTo(nx, player.y, player.size)) {
          player.x = nx;
        }
        if (canMoveTo(player.x, ny, player.size)) {
          player.y = ny;
        }
      }

      function shootArrow() {
        if (player.hasSword && swordDrawn) {
          swordDrawn = false;
          setMessage("Link wechselt zurück zum Bogen. Das Masterschwert ist wieder auf dem Rücken.");
        }
        const dirs = {
          up: [0, -1],
          down: [0, 1],
          left: [-1, 0],
          right: [1, 0],
        };
        const [dx, dy] = dirs[player.dir] || [0, 1];
        arrows.push({
          x: player.x + dx * 14,
          y: player.y + dy * 14,
          dx,
          dy,
          speed: 320,
          alive: true,
        });
        shootCooldown = 0.24;
      }

      function useSwordSlash() {
        if (!player.hasSword || !swordDrawn || gameOver || win) return;
        swordSlashTimer = 0.2;
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          if (dist(enemy, player) < 35) {
            enemy.alive = false;
          }
        }
      }

      function toggleSwordMode() {
        if (!player.hasSword || gameOver || win) return;
        if (!swordDrawn) {
          swordDrawn = true;
          setMessage("Masterschwert gezogen! Drücke F erneut für den Schlag.");
          return;
        }
        useSwordSlash();
      }

      function updateArrows(dt) {
        for (const arrow of arrows) {
          if (!arrow.alive) continue;
          arrow.x += arrow.dx * arrow.speed * dt;
          arrow.y += arrow.dy * arrow.speed * dt;

          if (!canMoveTo(arrow.x, arrow.y, 8)) {
            arrow.alive = false;
            continue;
          }

          for (const enemy of enemies) {
            if (!enemy.alive) continue;
            if (dist(arrow, enemy) < enemy.size * 0.55) {
              enemy.alive = false;
              arrow.alive = false;
              break;
            }
          }
        }

        arrows = arrows.filter((a) => a.alive);
      }

      function updateEnemies(dt) {
        for (const enemy of enemies) {
          if (!enemy.alive) continue;

          enemy.wanderTimer -= dt;
          if (enemy.wanderTimer <= 0) {
            enemy.wanderTimer = 0.6 + Math.random() * 1.4;
            const options = [
              [1, 0],
              [-1, 0],
              [0, 1],
              [0, -1],
            ];
            const pick = options[Math.floor(Math.random() * options.length)];
            enemy.dirX = pick[0];
            enemy.dirY = pick[1];
          }

          if (dist(enemy, player) < 150) {
            const vx = player.x - enemy.x;
            const vy = player.y - enemy.y;
            const len = Math.hypot(vx, vy) || 1;
            enemy.dirX = vx / len;
            enemy.dirY = vy / len;
          }

          const nx = enemy.x + enemy.dirX * enemy.speed * dt;
          const ny = enemy.y + enemy.dirY * enemy.speed * dt;

          if (canMoveTo(nx, enemy.y, enemy.size)) {
            enemy.x = nx;
          } else {
            enemy.dirX *= -1;
          }

          if (canMoveTo(enemy.x, ny, enemy.size)) {
            enemy.y = ny;
          } else {
            enemy.dirY *= -1;
          }

          if (dist(enemy, player) < 20 && invulnerableTimer <= 0) {
            player.hp -= 1;
            invulnerableTimer = 1;
            if (player.hp <= 0) {
              gameOver = true;
              setMessage("Du wurdest besiegt. Drücke R für Neustart.", true);
            } else {
              setMessage("Autsch! Gegner getroffen. Kurz unverwundbar.", true);
            }
          }
        }
      }

      function updateRupees() {
        for (const rupee of rupees) {
          if (rupee.taken) continue;
          if (dist(rupee, player) < 18) {
            rupee.taken = true;
            player.rupees += 1;
            if (player.rupees === MAX_RUPEES) {
              setMessage("Alle Rubine gesammelt! Schalte die letzten Bokoblins aus und geh zum Tempel.");
            }
          }
        }
      }

      function updateSwordPickup() {
        if (swordPickup.taken) return;
        if (dist(swordPickup, player) < 20) {
          swordPickup.taken = true;
          player.hasSword = true;
          setMessage("Masterschwert gefunden! F zieht es, F erneut schlägt zu.");
        }
      }

      function checkTempleWin() {
        if (player.rupees < MAX_RUPEES) return;
        if (enemies.some((enemy) => enemy.alive)) return;
        const tx = Math.floor(player.x / TILE);
        const ty = Math.floor(player.y / TILE);
        if (map[ty][tx] === "T") {
          win = true;
          setMessage("Sieg! Hyrule ist sicher. Drücke R für ein neues Spiel.");
        }
      }

      function drawMap() {
        const floorGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        floorGrad.addColorStop(0, "#5ab879");
        floorGrad.addColorStop(1, "#2a6f3e");
        ctx.fillStyle = floorGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const cell = map[y][x];
            const px = x * TILE;
            const py = y * TILE;

            if (cell === "#") {
              ctx.fillStyle = COLORS.wall;
              ctx.fillRect(px, py, TILE, TILE);
              ctx.fillStyle = COLORS.wallTop;
              ctx.fillRect(px, py, TILE, 6);
            } else if (cell === "T") {
              const g = ctx.createLinearGradient(px, py, px, py + TILE);
              g.addColorStop(0, "#f2ce77");
              g.addColorStop(1, COLORS.temple);
              ctx.fillStyle = g;
              ctx.fillRect(px, py, TILE, TILE);
              ctx.fillStyle = COLORS.templeDoor;
              ctx.fillRect(px + 10, py + 10, 12, 18);
            } else {
              ctx.fillStyle = (x + y) % 2 === 0 ? COLORS.grass : COLORS.grassAlt;
              ctx.fillRect(px, py, TILE, TILE);
            }
          }
        }
      }

      function drawSwordPickup() {
        if (swordPickup.taken) return;

        const x = swordPickup.x;
        const y = swordPickup.y;

        ctx.fillStyle = COLORS.shadow;
        ctx.beginPath();
        ctx.ellipse(x, y + 10, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(x, y + 1);
        ctx.rotate(-0.35);

        const bladeGrad = ctx.createLinearGradient(-2, -24, 2, 6);
        bladeGrad.addColorStop(0, "#eef6ff");
        bladeGrad.addColorStop(1, "#bfd0e0");
        ctx.fillStyle = bladeGrad;
        ctx.beginPath();
        ctx.moveTo(0, -25);
        ctx.lineTo(3.5, -17);
        ctx.lineTo(2.4, 6);
        ctx.lineTo(-2.4, 6);
        ctx.lineTo(-3.5, -17);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#6982d5";
        ctx.beginPath();
        ctx.moveTo(-8, 0);
        ctx.lineTo(-3.2, -3.4);
        ctx.lineTo(3.2, -3.4);
        ctx.lineTo(8, 0);
        ctx.lineTo(3.2, 3.4);
        ctx.lineTo(-3.2, 3.4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#4359a7";
        ctx.fillRect(-2.1, 3.2, 4.2, 8);
        ctx.fillStyle = "#8aa0e4";
        ctx.fillRect(-2.1, -10, 4.2, 13);
        ctx.fillStyle = "#f7dc86";
        ctx.beginPath();
        ctx.moveTo(0, -2.6);
        ctx.lineTo(1.2, -1.2);
        ctx.lineTo(0, 0.4);
        ctx.lineTo(-1.2, -1.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawRupees() {
        for (const rupee of rupees) {
          if (rupee.taken) continue;
          const depthScale = 0.92 + (rupee.y / WORLD_H) * 0.22;
          const halfW = 6 * depthScale;
          const halfH = 8 * depthScale;
          ctx.fillStyle = COLORS.rupee;
          ctx.beginPath();
          ctx.moveTo(rupee.x, rupee.y - halfH);
          ctx.lineTo(rupee.x + halfW, rupee.y);
          ctx.lineTo(rupee.x, rupee.y + halfH);
          ctx.lineTo(rupee.x - halfW, rupee.y);
          ctx.closePath();
          ctx.fill();
        }
      }

      function drawEnemies() {
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          const depthScale = 0.9 + (enemy.y / WORLD_H) * 0.25;
          const bodyW = (enemy.size / 2) * depthScale;
          const bodyH = (enemy.size / 2.2) * depthScale;

          ctx.fillStyle = COLORS.shadow;
          ctx.beginPath();
          ctx.ellipse(enemy.x, enemy.y + 9 * depthScale, 11 * depthScale, 6 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COLORS.bokoblin;
          ctx.beginPath();
          ctx.ellipse(enemy.x, enemy.y + depthScale, bodyW, bodyH, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#e89f61";
          ctx.beginPath();
          ctx.ellipse(enemy.x - 3, enemy.y - 3, 4.2, 3.1, -0.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COLORS.bokoblinDark;
          ctx.beginPath();
          ctx.moveTo(enemy.x - 9, enemy.y - 3);
          ctx.lineTo(enemy.x - 15, enemy.y - 10);
          ctx.lineTo(enemy.x - 5, enemy.y - 8);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(enemy.x + 9, enemy.y - 3);
          ctx.lineTo(enemy.x + 15, enemy.y - 10);
          ctx.lineTo(enemy.x + 5, enemy.y - 8);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#fff";
          ctx.fillRect(enemy.x - 5, enemy.y - 2, 3, 3);
          ctx.fillRect(enemy.x + 2, enemy.y - 2, 3, 3);
          ctx.fillStyle = "#2d8de0";
          ctx.fillRect(enemy.x - 4, enemy.y - 1, 1, 1);
          ctx.fillRect(enemy.x + 3, enemy.y - 1, 1, 1);

          ctx.fillStyle = "#7f3520";
          ctx.beginPath();
          ctx.ellipse(enemy.x - 6, enemy.y + 10, 3, 7, -0.25, 0, Math.PI * 2);
          ctx.ellipse(enemy.x + 6, enemy.y + 10, 3, 7, 0.25, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawArrows() {
        for (const arrow of arrows) {
          const angle = Math.atan2(arrow.dy, arrow.dx);
          const depthScale = 0.9 + (arrow.y / WORLD_H) * 0.24;

          ctx.save();
          ctx.translate(arrow.x, arrow.y);
          ctx.rotate(angle);

          ctx.fillStyle = COLORS.arrow;
          ctx.fillRect(-8 * depthScale, -1.5 * depthScale, 16 * depthScale, 3 * depthScale);
          ctx.fillStyle = "#efefef";
          ctx.beginPath();
          ctx.moveTo(8 * depthScale, 0);
          ctx.lineTo(13 * depthScale, -3 * depthScale);
          ctx.lineTo(13 * depthScale, 3 * depthScale);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#7b5b2c";
          ctx.beginPath();
          ctx.moveTo(-8 * depthScale, 0);
          ctx.lineTo(-12 * depthScale, -3 * depthScale);
          ctx.lineTo(-12 * depthScale, 3 * depthScale);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPlayer() {
        const flicker = invulnerableTimer > 0 && Math.floor(invulnerableTimer * 20) % 2 === 0;
        if (!flicker) {
          const depthScale = 0.91 + (player.y / WORLD_H) * 0.24;
          ctx.fillStyle = COLORS.shadow;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y + 10 * depthScale, 12 * depthScale, 6 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COLORS.linkPants;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y + 5 * depthScale, 8 * depthScale, 6 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.linkTunic;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y + depthScale, 10 * depthScale, 8 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.linkSleeve;
          ctx.beginPath();
          ctx.ellipse(player.x - 7 * depthScale, player.y + 2, 3.2 * depthScale, 2.4 * depthScale, -0.3, 0, Math.PI * 2);
          ctx.ellipse(player.x + 7 * depthScale, player.y + 2, 3.2 * depthScale, 2.4 * depthScale, 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.link;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y - 5 * depthScale, 6 * depthScale, 5.5 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.linkHair;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y - 9.5 * depthScale, 5.8 * depthScale, 2.8 * depthScale, 0, 0, Math.PI * 2);
          ctx.ellipse(player.x - 5 * depthScale, player.y - 6 * depthScale, 3 * depthScale, 3 * depthScale, 0, 0, Math.PI * 2);
          ctx.ellipse(player.x + 5 * depthScale, player.y - 6 * depthScale, 3 * depthScale, 3 * depthScale, 0, 0, Math.PI * 2);
          ctx.ellipse(player.x - 7.2 * depthScale, player.y - 4.5 * depthScale, 1.6 * depthScale, 2.8 * depthScale, -0.2, 0, Math.PI * 2);
          ctx.ellipse(player.x + 7.2 * depthScale, player.y - 4.5 * depthScale, 1.6 * depthScale, 2.8 * depthScale, 0.2, 0, Math.PI * 2);
          ctx.ellipse(player.x + 2.5 * depthScale, player.y - 1.5 * depthScale, 2 * depthScale, 5.5 * depthScale, 0.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#cde3ff";
          ctx.fillRect(player.x - 2.5 * depthScale, player.y - 6.8 * depthScale, 1.2 * depthScale, 1.2 * depthScale);
          ctx.fillRect(player.x + 1.4 * depthScale, player.y - 6.8 * depthScale, 1.2 * depthScale, 1.2 * depthScale);

          if (swordDrawn) {
            drawBowOnBack(depthScale);
          } else {
            drawBowInHand(depthScale);
          }

          if (player.hasSword && !swordDrawn) {
            drawSwordOnBack(depthScale);
          }

          if (player.hasSword && swordDrawn) {
            const dirAngle =
              player.dir === "up"
                ? -Math.PI / 2
                : player.dir === "down"
                  ? Math.PI / 2
                  : player.dir === "left"
                    ? Math.PI
                    : 0;
            const slashAngle = swordSlashTimer > 0 ? Math.sin(swordSlashTimer * 35) * 0.8 : 0;
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(dirAngle + slashAngle);
            const bladeGrad = ctx.createLinearGradient(6, -2.2, 21, 2.2);
            bladeGrad.addColorStop(0, "#ecf5ff");
            bladeGrad.addColorStop(1, "#b5c8dd");
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(6, -2.1);
            ctx.lineTo(18.6, -2.1);
            ctx.lineTo(22, 0);
            ctx.lineTo(18.6, 2.1);
            ctx.lineTo(6, 2.1);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#7a91d6";
            ctx.beginPath();
            ctx.moveTo(4.7, -4.2);
            ctx.lineTo(7.8, -2.2);
            ctx.lineTo(7.8, 2.2);
            ctx.lineTo(4.7, 4.2);
            ctx.lineTo(2.7, 2.2);
            ctx.lineTo(2.7, -2.2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#4760b4";
            ctx.fillRect(1, -1.2, 2, 2.4);
            ctx.fillStyle = "#f7dc86";
            ctx.beginPath();
            ctx.moveTo(6.2, 0);
            ctx.lineTo(7, -0.8);
            ctx.lineTo(7.8, 0);
            ctx.lineTo(7, 0.8);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        }
      }

      function drawBowInHand(depthScale) {
        const bowAngle =
          player.dir === "up" ? -Math.PI / 2 : player.dir === "down" ? Math.PI / 2 : player.dir === "left" ? Math.PI : 0;
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(bowAngle);
        ctx.strokeStyle = "#8e5f2a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(7, 0, 6, -1.25, 1.25);
        ctx.stroke();
        ctx.strokeStyle = "#d6c8a7";
        ctx.beginPath();
        ctx.moveTo(9, -5.6);
        ctx.lineTo(9, 5.6);
        ctx.stroke();
        ctx.restore();
      }

      function drawBowOnBack(depthScale) {
        ctx.save();
        ctx.translate(player.x - 2 * depthScale, player.y - 1 * depthScale);
        ctx.rotate(-0.8);
        ctx.strokeStyle = "#8e5f2a";
        ctx.lineWidth = 1.7;
        ctx.beginPath();
        ctx.arc(0, 0, 7 * depthScale, -1.25, 1.25);
        ctx.stroke();
        ctx.strokeStyle = "#d6c8a7";
        ctx.beginPath();
        ctx.moveTo(2 * depthScale, -6 * depthScale);
        ctx.lineTo(2 * depthScale, 6 * depthScale);
        ctx.stroke();
        ctx.restore();
      }

      function drawSwordOnBack(depthScale) {
        ctx.save();
        ctx.translate(player.x + 5 * depthScale, player.y - 2 * depthScale);
        ctx.rotate(0.65);
        ctx.fillStyle = "#d6e5f3";
        ctx.fillRect(-1.3 * depthScale, -10 * depthScale, 2.6 * depthScale, 11 * depthScale);
        ctx.fillStyle = "#6982d5";
        ctx.fillRect(-3.6 * depthScale, 0.2 * depthScale, 7.2 * depthScale, 2.2 * depthScale);
        ctx.fillStyle = "#4760b4";
        ctx.fillRect(-1.2 * depthScale, 2.4 * depthScale, 2.4 * depthScale, 4.8 * depthScale);
        ctx.restore();
      }

      function drawOverlay() {
        if (!gameOver && !win) return;

        ctx.fillStyle = "rgba(5, 8, 12, 0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 34px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText(win ? "SIEG!" : "GAME OVER", canvas.width / 2, canvas.height / 2 - 12);

        ctx.font = "18px Segoe UI";
        ctx.fillText("Drücke R für Neustart", canvas.width / 2, canvas.height / 2 + 24);
      }

      function update(dt) {
        if (gameOver || win) return;

        if (invulnerableTimer > 0) invulnerableTimer -= dt;
        if (shootCooldown > 0) shootCooldown -= dt;
        if (swordSlashTimer > 0) swordSlashTimer -= dt;

        updatePlayer(dt);
        updateArrows(dt);
        updateEnemies(dt);
        updateRupees();
        updateSwordPickup();
        if (player.rupees === MAX_RUPEES && enemies.every((enemy) => !enemy.alive)) {
          setMessage("Alle Bokoblins besiegt! Betritt jetzt den Tempel für den Sieg.");
        }
        checkTempleWin();
        updateHud();
      }

      function render() {
        drawMap();
        drawRupees();
        drawSwordPickup();
        drawEnemies();
        drawArrows();
        drawPlayer();
        drawOverlay();
      }

      let last = performance.now();
      function gameLoop(ts) {
        const dt = Math.min((ts - last) / 1000, 0.033);
        last = ts;

        update(dt);
        render();

        requestAnimationFrame(gameLoop);
      }

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "f", "r"].includes(key)) {
          event.preventDefault();
        }

        if (key === " ") {
          if (!gameOver && !win && shootCooldown <= 0) shootArrow();
          return;
        }

        if (key === "r") {
          resetGame();
          return;
        }

        if (key === "f") {
          toggleSwordMode();
          return;
        }

        keyState.add(key);
      });

      window.addEventListener("keyup", (event) => {
        keyState.delete(event.key.toLowerCase());
      });

      resetGame();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
