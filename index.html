<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Zelda 3D-Look – Browser-Spiel</title>
    <style>
      :root {
        --bg: #0b1622;
        --panel: #132738;
        --panel-border: #2c4f6b;
        --text: #e8f1f7;
        --accent: #f7d774;
        --accent-2: #76d39b;
        --danger: #ff6d6d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1b3650, var(--bg) 45%);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 1rem;
      }

      .game-shell {
        width: min(96vw, 920px);
        display: grid;
        gap: 0.8rem;
      }

      .hud {
        background: rgba(19, 39, 56, 0.92);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 0.7rem 0.9rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem 1.2rem;
        align-items: center;
        justify-content: space-between;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        align-items: center;
      }

      .stat {
        background: #0e1d2b;
        border: 1px solid #2a475f;
        border-radius: 999px;
        padding: 0.3rem 0.7rem;
        font-size: 0.95rem;
      }

      .stat strong {
        color: var(--accent);
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 12px;
        border: 2px solid var(--panel-border);
        background: #0f1d2a;
        image-rendering: pixelated;
        box-shadow: 0 22px 38px rgba(0, 0, 0, 0.42), 0 10px 14px rgba(0, 0, 0, 0.28);
        transform: none;
      }

      .canvas-wrap {
        padding-top: 0.4rem;
      }

      .help {
        margin: 0;
        opacity: 0.92;
        font-size: 0.95rem;
      }

      kbd {
        border: 1px solid #53758f;
        background: #0a1724;
        border-radius: 6px;
        padding: 0.1rem 0.35rem;
        font-weight: 700;
      }

      #message {
        color: var(--accent-2);
      }

      #message.warn {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="game-shell">
      <div class="hud">
        <div class="stats">
          <div class="stat">🧭 Level: <strong id="level">1</strong></div>
          <div class="stat">❤️ Leben: <strong id="hearts">5</strong></div>
          <div class="stat">⚔️ Schaden: <strong id="damage">2</strong></div>
          <div class="stat">💎 Rubine: <strong id="rupees">0</strong> / 8</div>
          <div class="stat">👾 Gegner: <strong id="enemies">0</strong></div>
        </div>
        <div class="stat" id="message">Sammle 8 Rubine, besiege Bokoblins und gehe in den Tempel für das nächste Level!</div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="640" height="416" aria-label="Mini Zelda Spiel"></canvas>
      </div>
      <p class="help">
        Steuerung: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> oder Pfeiltasten bewegen,
        <kbd>Leertaste</kbd> Bogen schießen, <kbd>F</kbd> Masterschwert ziehen/angreifen, <kbd>R</kbd> Neustart.
      </p>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const levelEl = document.getElementById("level");
      const heartsEl = document.getElementById("hearts");
      const damageEl = document.getElementById("damage");
      const rupeesEl = document.getElementById("rupees");
      const enemiesEl = document.getElementById("enemies");
      const messageEl = document.getElementById("message");

      const TILE = 32;
      const MAP_W = 20;
      const MAP_H = 13;
      const MAX_RUPEES = 8;
      const WORLD_H = MAP_H * TILE;
      const SAFE_SPAWN_ATTEMPTS = 800;

      const COLORS = {
        grass: "#1f3f54",
        grassAlt: "#244a62",
        wall: "#25303c",
        wallTop: "#3e4f62",
        temple: "#d5b35f",
        templeDoor: "#684f27",
        shop: "#7b4db5",
        shopDoor: "#2c1744",
        rupee: "#baff8a",
        link: "#f2d7b0",
        linkHair: "#9b6730",
        linkTunic: "#2e80c9",
        linkHat: "#2c7bc0",
        linkPants: "#4a5a82",
        linkSleeve: "#ead7be",
        enemy: "#cc5757",
        sword: "#f2f2f2",
        shadow: "rgba(0,0,0,0.28)",
        bokoblin: "#d87532",
        bokoblinDark: "#a04a22",
        arrow: "#d9c7a0",
        steel: "#dbe8f3",
        steelDark: "#8da0b3",
        shopBg: "#050505",
        shopWall: "#f08c1a",
      };

      let map = [];

      const keyState = new Set();

      let player;
      let enemies;
      let rupees;
      let invulnerableTimer = 0;
      let arrows;
      let enemyArrows;
      let shootCooldown = 0;
      let swordPickup;
      let swordSlashTimer = 0;
      let swordDrawn = false;
      let gameOver = false;
      let win = false;
      let levelWallCount = 0;
      let worldTime = 0;
      let endStateTimer = 0;
      let endParticles = [];
      let level = 1;
      let inShop = false;
      let shopStations = null;
      let shopTouchCooldown = 0;
      let shopChoiceMade = false;

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function generateRandomLevel() {
        const reserved = new Set(["1,1", "1,2", "2,1", "2,2", "3,1", "1,3"]);

        for (let attempt = 0; attempt < 140; attempt += 1) {
          const grid = Array.from({ length: MAP_H }, (_, y) =>
            Array.from({ length: MAP_W }, (_, x) => (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1 ? "#" : ".")),
          );

          const wallCount = randInt(8, 34);

          let placedWalls = 0;
          let tries = 0;
          while (placedWalls < wallCount && tries < 600) {
            tries += 1;
            const x = randInt(1, MAP_W - 2);
            const y = randInt(1, MAP_H - 2);
            if (reserved.has(`${x},${y}`)) continue;
            if (grid[y][x] !== ".") continue;
            grid[y][x] = "#";
            placedWalls += 1;
          }

          const placeSpecialTile = (symbol) => {
            let placed = false;
            while (!placed) {
              const tx = randInt(1, MAP_W - 2);
              const ty = randInt(1, MAP_H - 2);
              if (reserved.has(`${tx},${ty}`)) continue;
              if (grid[ty][tx] !== ".") continue;
              grid[ty][tx] = symbol;
              placed = true;
            }
          };

          if (level % 3 === 0) {
            placeSpecialTile("S");
            placeSpecialTile("T");
          } else {
            placeSpecialTile("T");
          }

          if (isLevelReachable(grid)) {
            levelWallCount = placedWalls;
            return grid.map((row) => row.join(""));
          }
        }

        levelWallCount = 0;
        return Array.from({ length: MAP_H }, (_, y) =>
          Array.from({ length: MAP_W }, (_, x) => (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1 ? "#" : ".")).join(""),
        );
      }


      function generateShopLevel() {
        levelWallCount = 0;
        const centerTempleX = Math.floor(MAP_W / 2);
        const centerTempleY = 1;
        return Array.from({ length: MAP_H }, (_, y) =>
          Array.from({ length: MAP_W }, (_, x) => {
            if (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1) return "#";
            if (x === centerTempleX && y === centerTempleY) return "T";
            return ".";
          }).join(""),
        );
      }

      function isLevelReachable(grid) {
        const start = { x: 1, y: 1 };
        const queue = [start];
        const visited = new Set([`${start.x},${start.y}`]);

        while (queue.length > 0) {
          const current = queue.shift();
          if (grid[current.y][current.x] === "T" || grid[current.y][current.x] === "S") return true;

          const nextCells = [
            [current.x + 1, current.y],
            [current.x - 1, current.y],
            [current.x, current.y + 1],
            [current.x, current.y - 1],
          ];

          for (const [nx, ny] of nextCells) {
            if (nx < 1 || ny < 1 || nx >= MAP_W - 1 || ny >= MAP_H - 1) continue;
            if (grid[ny][nx] === "#") continue;
            const key = `${nx},${ny}`;
            if (visited.has(key)) continue;
            visited.add(key);
            queue.push({ x: nx, y: ny });
          }
        }

        return false;
      }

      function setMessage(text, warning = false) {
        messageEl.textContent = text;
        messageEl.classList.toggle("warn", warning);
      }

      function tileAt(px, py) {
        const tx = Math.floor(px / TILE);
        const ty = Math.floor(py / TILE);
        if (ty < 0 || ty >= MAP_H || tx < 0 || tx >= MAP_W) return "#";
        return map[ty][tx];
      }

      function isBlocked(px, py) {
        return tileAt(px, py) === "#";
      }

      function canMoveTo(nx, ny, size = 22) {
        const half = size / 2;
        return (
          !isBlocked(nx - half, ny - half) &&
          !isBlocked(nx + half, ny - half) &&
          !isBlocked(nx - half, ny + half) &&
          !isBlocked(nx + half, ny + half)
        );
      }

      function randomWalkablePosition() {
        for (let attempts = 0; attempts < SAFE_SPAWN_ATTEMPTS; attempts += 1) {
          const tx = 1 + Math.floor(Math.random() * (MAP_W - 2));
          const ty = 1 + Math.floor(Math.random() * (MAP_H - 2));
          if (map[ty][tx] !== ".") continue;
          return { x: tx * TILE + TILE / 2, y: ty * TILE + TILE / 2 };
        }

        return { x: TILE * 1.5, y: TILE * 1.5 };
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function setupLevel(keepStats = true) {
        const isShopLevel = level % 3 === 0;
        map = isShopLevel ? generateShopLevel() : generateRandomLevel();

        if (!keepStats || !player) {
          player = {
            x: TILE * 1.5,
            y: TILE * 1.5,
            dir: "down",
            speed: 150,
            hp: 5,
            rupees: 0,
            bowDamage: 2,
            swordDamage: 4,
            size: 22,
            hasSword: false,
          };
          level = 1;
        } else {
          player.x = TILE * 1.5;
          player.y = TILE * 1.5;
          player.dir = "down";
        }

        const enemyCount = isShopLevel ? 0 : randInt(1, 5);
        enemies = Array.from({ length: enemyCount }, () => {
          const pos = randomWalkablePosition();
          const hasBow = Math.random() < 0.4;
          return {
            ...pos,
            size: 22,
            speed: 50 + Math.random() * 30,
            dirX: Math.random() > 0.5 ? 1 : -1,
            dirY: Math.random() > 0.5 ? 1 : -1,
            wanderTimer: 0,
            attackCooldown: 0.5 + Math.random() * 0.8,
            attackTimer: 0,
            attackHit: false,
            rangedCooldown: 0.9 + Math.random() * 0.9,
            rangedWindup: 0,
            rangedShotFired: false,
            hasBow,
            facing: 1,
            animOffset: Math.random() * Math.PI * 2,
            hp: 5,
            maxHp: 5,
            alive: true,
          };
        });

        rupees = isShopLevel
          ? []
          : Array.from({ length: MAX_RUPEES }, () => ({
              ...randomWalkablePosition(),
              taken: false,
            }));

        invulnerableTimer = 0;
        arrows = [];
        enemyArrows = [];
        shootCooldown = 0;
        let swordPos = randomWalkablePosition();
        while (dist(swordPos, player) < 110) {
          swordPos = randomWalkablePosition();
        }
        swordPickup = {
          ...swordPos,
          taken: isShopLevel,
        };
        swordSlashTimer = 0;
        swordDrawn = false;
        gameOver = false;
        win = false;
        inShop = isShopLevel;
        shopStations = isShopLevel
          ? {
              heart: { x: TILE * 3.5, y: canvas.height / 2, radius: 26 },
              sword: { x: canvas.width - TILE * 3.5, y: canvas.height / 2, radius: 26 },
            }
          : null;
        shopTouchCooldown = 0;
        shopChoiceMade = false;
        worldTime = 0;
        endStateTimer = 0;
        endParticles = [];

        if (isShopLevel) {
          setMessage("Shop: Wähle genau eins – links Herz (+1 Leben) oder rechts +1 Schaden.");
        } else {
          setMessage(`Level ${level}: ${enemyCount} Bokoblins (5 HP, teils mit Bogen) und ${levelWallCount} Wände warten.`);
        }
        updateHud();
      }

      function resetGame() {
        setupLevel(false);
      }

      function nextLevel() {
        level += 1;
        setupLevel(true);
      }

      function spawnEndParticles(type) {
        const count = type === "win" ? 120 : 90;
        endParticles = Array.from({ length: count }, () => {
          if (type === "win") {
            return {
              type,
              x: Math.random() * canvas.width,
              y: -10 - Math.random() * canvas.height * 0.4,
              vx: -70 + Math.random() * 140,
              vy: 90 + Math.random() * 210,
              size: 3 + Math.random() * 5,
              life: 2.4 + Math.random() * 1.4,
              rotation: Math.random() * Math.PI * 2,
              spin: -4 + Math.random() * 8,
              color: ["#ff6d6d", "#6bf8df", "#f7d774", "#76d39b", "#9cc8ff"][randInt(0, 4)],
            };
          }

          return {
            type,
            x: Math.random() * canvas.width,
            y: -10 - Math.random() * canvas.height * 0.25,
            vx: -12 + Math.random() * 24,
            vy: 80 + Math.random() * 90,
            size: 3 + Math.random() * 4,
            life: 1.9 + Math.random() * 1.2,
            wobble: Math.random() * Math.PI * 2,
            color: "rgba(128, 186, 255, 0.92)",
          };
        });
      }

      function updateHud() {
        levelEl.textContent = level;
        heartsEl.textContent = player.hp;
        damageEl.textContent = player.hasSword && swordDrawn ? player.swordDamage : player.bowDamage;
        rupeesEl.textContent = player.rupees;
        enemiesEl.textContent = enemies.filter((e) => e.alive).length;
      }

      function updatePlayer(dt) {
        let mx = 0;
        let my = 0;

        if (keyState.has("arrowup") || keyState.has("w")) {
          my -= 1;
          player.dir = "up";
        }
        if (keyState.has("arrowdown") || keyState.has("s")) {
          my += 1;
          player.dir = "down";
        }
        if (keyState.has("arrowleft") || keyState.has("a")) {
          mx -= 1;
          player.dir = "left";
        }
        if (keyState.has("arrowright") || keyState.has("d")) {
          mx += 1;
          player.dir = "right";
        }

        if (mx !== 0 || my !== 0) {
          const len = Math.hypot(mx, my);
          mx /= len;
          my /= len;
        }

        const nx = player.x + mx * player.speed * dt;
        const ny = player.y + my * player.speed * dt;

        if (canMoveTo(nx, player.y, player.size)) {
          player.x = nx;
        }
        if (canMoveTo(player.x, ny, player.size)) {
          player.y = ny;
        }
      }

      function shootArrow() {
        if (player.hasSword && swordDrawn) {
          swordDrawn = false;
          setMessage("Link wechselt zurück zum Bogen. Das Masterschwert ist wieder auf dem Rücken.");
          updateHud();
        }
        const dirs = {
          up: [0, -1],
          down: [0, 1],
          left: [-1, 0],
          right: [1, 0],
        };
        const [dx, dy] = dirs[player.dir] || [0, 1];
        arrows.push({
          x: player.x + dx * 14,
          y: player.y + dy * 14,
          dx,
          dy,
          speed: 320,
          alive: true,
        });
        shootCooldown = 0.24;
      }

      function useSwordSlash() {
        if (!player.hasSword || !swordDrawn || gameOver || win) return;
        swordSlashTimer = 0.2;
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          if (isEnemyInSwordReach(enemy)) {
            enemy.hp -= player.swordDamage;
            if (enemy.hp <= 0) enemy.alive = false;
          }
        }
      }

      function isEnemyInSwordReach(enemy) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const reach = TILE * 2.5;
        const hitWidth = enemy.size * 0.5 + 10;

        if (player.dir === "up") return dy <= 0 && dy >= -reach && Math.abs(dx) <= hitWidth;
        if (player.dir === "down") return dy >= 0 && dy <= reach && Math.abs(dx) <= hitWidth;
        if (player.dir === "left") return dx <= 0 && dx >= -reach && Math.abs(dy) <= hitWidth;
        return dx >= 0 && dx <= reach && Math.abs(dy) <= hitWidth;
      }

      function toggleSwordMode() {
        if (!player.hasSword || gameOver || win) return;
        if (!swordDrawn) {
          swordDrawn = true;
          setMessage("Masterschwert gezogen! Drücke F erneut für den Schlag.");
          updateHud();
          return;
        }
        useSwordSlash();
      }

      function updateArrows(dt) {
        for (const arrow of arrows) {
          if (!arrow.alive) continue;
          arrow.x += arrow.dx * arrow.speed * dt;
          arrow.y += arrow.dy * arrow.speed * dt;

          if (!canMoveTo(arrow.x, arrow.y, 8)) {
            arrow.alive = false;
            continue;
          }

          for (const enemy of enemies) {
            if (!enemy.alive) continue;
            if (dist(arrow, enemy) < enemy.size * 0.55) {
              enemy.hp -= player.bowDamage;
              if (enemy.hp <= 0) enemy.alive = false;
              arrow.alive = false;
              break;
            }
          }
        }

        arrows = arrows.filter((a) => a.alive);
      }

      function shootEnemyArrow(enemy) {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const len = Math.hypot(dx, dy) || 1;
        enemyArrows.push({
          x: enemy.x + (dx / len) * 12,
          y: enemy.y + (dy / len) * 12,
          dx: dx / len,
          dy: dy / len,
          speed: 205,
          alive: true,
        });
      }

      function updateEnemyArrows(dt) {
        for (const arrow of enemyArrows) {
          if (!arrow.alive) continue;
          arrow.x += arrow.dx * arrow.speed * dt;
          arrow.y += arrow.dy * arrow.speed * dt;

          if (!canMoveTo(arrow.x, arrow.y, 8)) {
            arrow.alive = false;
            continue;
          }

          if (dist(arrow, player) < player.size * 0.45 && invulnerableTimer <= 0) {
            arrow.alive = false;
            player.hp -= 1;
            invulnerableTimer = 1;
            if (player.hp <= 0) {
              gameOver = true;
              endStateTimer = 0;
              spawnEndParticles("loss");
              setMessage("Du wurdest von einem Bokoblin-Pfeil besiegt. Drücke R für Neustart.", true);
            } else {
              setMessage("Ein Bokoblin-Pfeil hat dich getroffen!", true);
            }
          }
        }

        enemyArrows = enemyArrows.filter((a) => a.alive);
      }

      function updateEnemies(dt) {
        for (const enemy of enemies) {
          if (!enemy.alive) continue;

          enemy.wanderTimer -= dt;
          enemy.attackCooldown -= dt;
          enemy.attackTimer = Math.max(0, enemy.attackTimer - dt);
          enemy.rangedCooldown -= dt;
          enemy.rangedWindup = Math.max(0, enemy.rangedWindup - dt);
          if (enemy.wanderTimer <= 0) {
            enemy.wanderTimer = 0.6 + Math.random() * 1.4;
            const options = [
              [1, 0],
              [-1, 0],
              [0, 1],
              [0, -1],
            ];
            const pick = options[Math.floor(Math.random() * options.length)];
            enemy.dirX = pick[0];
            enemy.dirY = pick[1];
          }

          if (dist(enemy, player) < 150) {
            const vx = player.x - enemy.x;
            const vy = player.y - enemy.y;
            const len = Math.hypot(vx, vy) || 1;
            enemy.dirX = vx / len;
            enemy.dirY = vy / len;
          }
          if (enemy.dirX !== 0) {
            enemy.facing = enemy.dirX < 0 ? -1 : 1;
          }

          const nx = enemy.x + enemy.dirX * enemy.speed * dt;
          const ny = enemy.y + enemy.dirY * enemy.speed * dt;

          if (canMoveTo(nx, enemy.y, enemy.size)) {
            enemy.x = nx;
          } else {
            enemy.dirX *= -1;
          }

          if (canMoveTo(enemy.x, ny, enemy.size)) {
            enemy.y = ny;
          } else {
            enemy.dirY *= -1;
          }

          const enemyDist = dist(enemy, player);
          if (enemy.hasBow && enemyDist < 220 && enemy.rangedCooldown <= 0 && enemy.rangedWindup <= 0) {
            enemy.rangedWindup = 0.18;
            enemy.rangedShotFired = false;
            enemy.rangedCooldown = 1.25 + Math.random() * 1.1;
          }

          if (enemy.hasBow && enemy.rangedWindup > 0.1 && !enemy.rangedShotFired) {
            enemy.rangedShotFired = true;
            shootEnemyArrow(enemy);
          }

          if (enemyDist < 48 && enemy.attackCooldown <= 0 && enemy.attackTimer <= 0) {
            enemy.attackTimer = 0.3;
            enemy.attackCooldown = 0.85 + Math.random() * 0.65;
            enemy.attackHit = false;
          }

          const swordCanHit = enemy.attackTimer > 0.14 && enemy.attackTimer < 0.24 && enemyDist < 36;
          if (swordCanHit && !enemy.attackHit && invulnerableTimer <= 0) {
            enemy.attackHit = true;
            player.hp -= 1;
            invulnerableTimer = 1;
            if (player.hp <= 0) {
              gameOver = true;
              endStateTimer = 0;
              spawnEndParticles("loss");
              setMessage("Du wurdest besiegt. Drücke R für Neustart.", true);
            } else {
              setMessage("Treffer vom Bokoblin-Schwert! Kurz unverwundbar.", true);
            }
          } else if (enemyDist < 20 && enemy.attackTimer <= 0 && invulnerableTimer <= 0) {
            player.hp -= 1;
            invulnerableTimer = 1;
            if (player.hp <= 0) {
              gameOver = true;
              endStateTimer = 0;
              spawnEndParticles("loss");
              setMessage("Du wurdest besiegt. Drücke R für Neustart.", true);
            } else {
              setMessage("Autsch! Gegner getroffen. Kurz unverwundbar.", true);
            }
          }
        }
      }

      function updateRupees() {
        for (const rupee of rupees) {
          if (rupee.taken) continue;
          if (dist(rupee, player) < 18) {
            rupee.taken = true;
            player.rupees += 1;
            if (player.rupees === MAX_RUPEES) {
              setMessage("Alle Rubine gesammelt! Schalte die letzten Bokoblins aus und geh zum Tempel.");
            }
          }
        }
      }

      function updateSwordPickup() {
        if (swordPickup.taken) return;
        if (dist(swordPickup, player) < 20) {
          swordPickup.taken = true;
          player.hasSword = true;
          setMessage("Masterschwert gefunden! F zieht es, F erneut schlägt zu.");
        }
      }

      function buyHeart() {
        if (!inShop) return;
        if (shopChoiceMade) {
          setMessage("Du hast im Shop schon gewählt. Geh jetzt zum Tempel!");
          return;
        }
        player.hp += 1;
        shopChoiceMade = true;
        setMessage("Herz gewählt! +1 Leben. Jetzt zum Tempel.");
        updateHud();
      }

      function buyDamage() {
        if (!inShop) return;
        if (shopChoiceMade) {
          setMessage("Du hast im Shop schon gewählt. Geh jetzt zum Tempel!");
          return;
        }
        player.swordDamage += 1;
        player.bowDamage += 1;
        shopChoiceMade = true;
        setMessage(`Schaden gewählt! Masterschwert: ${player.swordDamage}, Bogen: ${player.bowDamage}. Jetzt zum Tempel.`);
        updateHud();
      }


      function updateShopStations(dt) {
        if (!inShop || !shopStations) return;
        shopTouchCooldown = Math.max(0, shopTouchCooldown - dt);
        if (shopTouchCooldown > 0) return;

        if (dist(player, shopStations.heart) < shopStations.heart.radius) {
          buyHeart();
          shopTouchCooldown = 0.25;
          return;
        }

        if (dist(player, shopStations.sword) < shopStations.sword.radius) {
          buyDamage();
          shopTouchCooldown = 0.25;
        }
      }

      function checkTempleWin() {
        const tx = Math.floor(player.x / TILE);
        const ty = Math.floor(player.y / TILE);
        const tile = map[ty]?.[tx];

        if (tile === "S") {
          setMessage("Willkommen im Shop! Wähle links Herz oder rechts +1 Schaden.");
          return;
        }

        if (tile !== "T") return;

        if (inShop) {
          nextLevel();
          return;
        }

        if (player.rupees < MAX_RUPEES) return;
        if (enemies.some((enemy) => enemy.alive)) return;

        nextLevel();
      }

      function updateEndEffects(dt) {
        if (!gameOver && !win) return;
        endStateTimer = Math.min(endStateTimer + dt, 3.5);

        for (const particle of endParticles) {
          if (particle.life <= 0) continue;
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;

          if (particle.type === "win") {
            particle.vy += 240 * dt;
            particle.rotation += particle.spin * dt;
          } else {
            particle.wobble += dt * 7;
            particle.x += Math.sin(particle.wobble) * 18 * dt;
          }
        }

        endParticles = endParticles.filter((particle) => particle.life > 0 && particle.y < canvas.height + 32);
      }

      function drawEndParticles() {
        if ((!gameOver && !win) || endParticles.length === 0) return;

        for (const particle of endParticles) {
          ctx.save();
          ctx.translate(particle.x, particle.y);
          ctx.fillStyle = particle.color;

          if (particle.type === "win") {
            ctx.rotate(particle.rotation);
            ctx.fillRect(-particle.size / 2, -particle.size / 2, particle.size, particle.size);
          } else {
            ctx.beginPath();
            ctx.ellipse(0, 0, particle.size * 0.55, particle.size, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function drawMap() {
        if (inShop) {
          drawShopBackdrop();
          return;
        }

        const floorGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        floorGrad.addColorStop(0, "#5ab879");
        floorGrad.addColorStop(1, "#2a6f3e");
        ctx.fillStyle = floorGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const cell = map[y][x];
            const px = x * TILE;
            const py = y * TILE;

            if (cell === "#") {
              ctx.fillStyle = COLORS.wall;
              ctx.fillRect(px, py, TILE, TILE);
              ctx.fillStyle = COLORS.wallTop;
              ctx.fillRect(px, py, TILE, 6);
            } else if (cell === "T") {
              const g = ctx.createLinearGradient(px, py, px, py + TILE);
              g.addColorStop(0, "#f2ce77");
              g.addColorStop(1, COLORS.temple);
              ctx.fillStyle = g;
              ctx.fillRect(px, py, TILE, TILE);
              ctx.fillStyle = COLORS.templeDoor;
              ctx.fillRect(px + 10, py + 10, 12, 18);
            } else if (cell === "S") {
              const sg = ctx.createLinearGradient(px, py, px, py + TILE);
              sg.addColorStop(0, "#9f71da");
              sg.addColorStop(1, COLORS.shop);
              ctx.fillStyle = sg;
              ctx.fillRect(px, py, TILE, TILE);
              ctx.fillStyle = COLORS.shopDoor;
              ctx.fillRect(px + 10, py + 10, 12, 18);
            } else {
              ctx.fillStyle = (x + y) % 2 === 0 ? COLORS.grass : COLORS.grassAlt;
              ctx.fillRect(px, py, TILE, TILE);
            }
          }
        }
      }

      function drawShopBackdrop() {
        ctx.fillStyle = COLORS.shopBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = COLORS.shopWall;
        ctx.lineWidth = TILE;
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height + 20, canvas.width * 0.54, Math.PI, Math.PI * 2);
        ctx.stroke();

        const templeX = Math.floor(MAP_W / 2) * TILE;
        const templeY = TILE;
        ctx.fillStyle = "#ffe0b4";
        ctx.fillRect(templeX, templeY, TILE, TILE);
        ctx.fillStyle = "#8f6432";
        ctx.fillRect(templeX + 10, templeY + 9, 12, 18);
      }


      function roundedRectPath(x, y, width, height, radius) {
        const r = Math.max(0, Math.min(radius, width / 2, height / 2));
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawShopStations() {
        if (!inShop || !shopStations) return;

        const drawPlate = (station, colorTop, colorBottom) => {
          const grad = ctx.createLinearGradient(station.x, station.y - 18, station.x, station.y + 18);
          grad.addColorStop(0, colorTop);
          grad.addColorStop(1, colorBottom);
          ctx.fillStyle = grad;

          if (typeof ctx.roundRect === "function") {
            ctx.beginPath();
            ctx.roundRect(station.x - 26, station.y - 16, 52, 32, 8);
          } else {
            roundedRectPath(station.x - 26, station.y - 16, 52, 32, 8);
          }

          ctx.fill();
          ctx.strokeStyle = "rgba(14, 19, 30, 0.55)";
          ctx.lineWidth = 2;
          ctx.stroke();
        };

        drawPlate(shopStations.heart, "#ffd8dd", "#df5f74");
        drawPlate(shopStations.sword, "#ecf5ff", "#7e9ec0");

        // Herz-Symbol links
        const h = shopStations.heart;
        ctx.fillStyle = "#b91d39";
        ctx.beginPath();
        ctx.moveTo(h.x, h.y + 9);
        ctx.bezierCurveTo(h.x - 22, h.y - 6, h.x - 16, h.y - 25, h.x, h.y - 10);
        ctx.bezierCurveTo(h.x + 16, h.y - 25, h.x + 22, h.y - 6, h.x, h.y + 9);
        ctx.fill();

        // Schwert-Symbol rechts
        const sw = shopStations.sword;
        ctx.save();
        ctx.translate(sw.x, sw.y + 2);
        ctx.rotate(-0.25);
        ctx.fillStyle = "#e7eef8";
        ctx.fillRect(-2, -15, 4, 20);
        ctx.fillStyle = "#4560a2";
        ctx.fillRect(-8, 2, 16, 4);
        ctx.fillStyle = "#2b3f79";
        ctx.fillRect(-2, 6, 4, 7);
        ctx.restore();

        ctx.fillStyle = "rgba(8, 14, 20, 0.75)";
        ctx.font = "12px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText("+1 Herz", h.x, h.y + 28);
        ctx.fillText("+1 Schaden", sw.x, sw.y + 28);
      }

      function drawShopNpc() {
        if (!inShop) return;

        const npcX = canvas.width / 2;
        const npcY = canvas.height / 2 - 62;

        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.beginPath();
        ctx.ellipse(npcX, npcY + 36, 18, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#d9b07f";
        ctx.beginPath();
        ctx.arc(npcX, npcY - 10, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#4a2e1d";
        ctx.fillRect(npcX - 12, npcY + 2, 24, 28);
        ctx.fillStyle = "#f39b4a";
        ctx.fillRect(npcX - 14, npcY + 12, 28, 7);

        const bubbleW = 330;
        const bubbleH = 48;
        const bubbleX = npcX - bubbleW / 2;
        const bubbleY = npcY - 76;
        ctx.fillStyle = "rgba(25,25,25,0.86)";
        ctx.strokeStyle = "#ffb24a";
        ctx.lineWidth = 2;
        if (typeof ctx.roundRect === "function") {
          ctx.beginPath();
          ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 10);
        } else {
          roundedRectPath(bubbleX, bubbleY, bubbleW, bubbleH, 10);
        }
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#ffe7c0";
        ctx.textAlign = "center";
        ctx.font = "14px Segoe UI";
        ctx.fillText("Wähle eins: Herz oder +1 Schaden!", npcX, bubbleY + 20);
        ctx.fillText("Nur eine Wahl pro Shop – danach direkt zum Tempel.", npcX, bubbleY + 38);
      }

      function drawSwordPickup() {
        if (swordPickup.taken) return;

        const x = swordPickup.x;
        const y = swordPickup.y;

        ctx.fillStyle = COLORS.shadow;
        ctx.beginPath();
        ctx.ellipse(x, y + 10, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(x, y + 1);
        ctx.rotate(-0.35);

        const bladeGrad = ctx.createLinearGradient(-2, -24, 2, 6);
        bladeGrad.addColorStop(0, "#eef6ff");
        bladeGrad.addColorStop(1, "#bfd0e0");
        ctx.fillStyle = bladeGrad;
        ctx.beginPath();
        ctx.moveTo(0, -25);
        ctx.lineTo(3.5, -17);
        ctx.lineTo(2.4, 6);
        ctx.lineTo(-2.4, 6);
        ctx.lineTo(-3.5, -17);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#6982d5";
        ctx.beginPath();
        ctx.moveTo(-8, 0);
        ctx.lineTo(-3.2, -3.4);
        ctx.lineTo(3.2, -3.4);
        ctx.lineTo(8, 0);
        ctx.lineTo(3.2, 3.4);
        ctx.lineTo(-3.2, 3.4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#4359a7";
        ctx.fillRect(-2.1, 3.2, 4.2, 8);
        ctx.fillStyle = "#8aa0e4";
        ctx.fillRect(-2.1, -10, 4.2, 13);
        ctx.fillStyle = "#f7dc86";
        ctx.beginPath();
        ctx.moveTo(0, -2.6);
        ctx.lineTo(1.2, -1.2);
        ctx.lineTo(0, 0.4);
        ctx.lineTo(-1.2, -1.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawRupees() {
        for (const rupee of rupees) {
          if (rupee.taken) continue;
          const depthScale = 0.92 + (rupee.y / WORLD_H) * 0.22;
          const halfW = 6.2 * depthScale;
          const halfH = 8.4 * depthScale;

          const outline = [
            [rupee.x, rupee.y - halfH],
            [rupee.x + halfW, rupee.y],
            [rupee.x, rupee.y + halfH],
            [rupee.x - halfW, rupee.y],
          ];

          const gemGrad = ctx.createLinearGradient(rupee.x, rupee.y - halfH, rupee.x, rupee.y + halfH);
          gemGrad.addColorStop(0, "#dcffc9");
          gemGrad.addColorStop(0.45, "#baff8a");
          gemGrad.addColorStop(1, "#6ecf6a");

          ctx.beginPath();
          ctx.moveTo(outline[0][0], outline[0][1]);
          for (let i = 1; i < outline.length; i += 1) ctx.lineTo(outline[i][0], outline[i][1]);
          ctx.closePath();
          ctx.fillStyle = gemGrad;
          ctx.fill();

          ctx.strokeStyle = "#000000";
          ctx.lineWidth = Math.max(1.2, depthScale * 1.05);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(rupee.x, rupee.y - halfH * 0.85);
          ctx.lineTo(rupee.x + halfW * 0.56, rupee.y);
          ctx.lineTo(rupee.x, rupee.y + halfH * 0.85);
          ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
          ctx.lineWidth = Math.max(0.8, depthScale * 0.75);
          ctx.stroke();
        }
      }

      function drawEnemies() {
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          const depthScale = 0.9 + (enemy.y / WORLD_H) * 0.25;
          const bodyW = (enemy.size / 2) * depthScale;
          const bodyH = (enemy.size / 2.2) * depthScale;
          const stride = Math.sin(worldTime * 10 + enemy.animOffset) * 2.8 * depthScale;
          const swing = enemy.attackTimer > 0 ? Math.sin((enemy.attackTimer / 0.3) * Math.PI) : 0;
          const armSwing = stride * 0.45 + swing * 3.6 * depthScale;

          ctx.fillStyle = COLORS.shadow;
          ctx.beginPath();
          ctx.ellipse(enemy.x, enemy.y + 9 * depthScale, 11 * depthScale, 6 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();

          // Beine
          ctx.fillStyle = "#7f3520";
          ctx.beginPath();
          ctx.ellipse(enemy.x - 5.4 * depthScale, enemy.y + 11 + stride, 2.9 * depthScale, 7.3 * depthScale, -0.2, 0, Math.PI * 2);
          ctx.ellipse(enemy.x + 5.4 * depthScale, enemy.y + 11 - stride, 2.9 * depthScale, 7.3 * depthScale, 0.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COLORS.bokoblin;
          ctx.beginPath();
          ctx.ellipse(enemy.x, enemy.y + depthScale, bodyW, bodyH, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#e89f61";
          ctx.beginPath();
          ctx.ellipse(enemy.x - 3, enemy.y - 3, 4.2, 3.1, -0.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COLORS.bokoblinDark;
          ctx.beginPath();
          ctx.moveTo(enemy.x - 9, enemy.y - 3);
          ctx.lineTo(enemy.x - 15, enemy.y - 10);
          ctx.lineTo(enemy.x - 5, enemy.y - 8);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(enemy.x + 9, enemy.y - 3);
          ctx.lineTo(enemy.x + 15, enemy.y - 10);
          ctx.lineTo(enemy.x + 5, enemy.y - 8);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#fff";
          ctx.fillRect(enemy.x - 5, enemy.y - 2, 3, 3);
          ctx.fillRect(enemy.x + 2, enemy.y - 2, 3, 3);
          ctx.fillStyle = "#2d8de0";
          ctx.fillRect(enemy.x - 4, enemy.y - 1, 1, 1);
          ctx.fillRect(enemy.x + 3, enemy.y - 1, 1, 1);

          // Arme
          ctx.fillStyle = "#8a4327";
          ctx.beginPath();
          ctx.ellipse(enemy.x - 8.2 * depthScale, enemy.y + 5 - armSwing, 2.6 * depthScale, 6 * depthScale, -0.65, 0, Math.PI * 2);
          ctx.ellipse(enemy.x + 8.2 * depthScale, enemy.y + 5 + armSwing, 2.6 * depthScale, 6 * depthScale, 0.65, 0, Math.PI * 2);
          ctx.fill();

          if (enemy.hasBow) {
            const bowHandX = enemy.x + enemy.facing * 8.5 * depthScale;
            const bowHandY = enemy.y + 4 + armSwing * 0.9;
            const bowAngle = enemy.facing < 0 ? Math.PI : 0;
            ctx.save();
            ctx.translate(bowHandX, bowHandY);
            ctx.rotate(bowAngle);
            ctx.strokeStyle = "#7a4f25";
            ctx.lineWidth = 2 * depthScale;
            ctx.beginPath();
            ctx.arc(4 * depthScale, 0, 5.5 * depthScale, -1.2, 1.2);
            ctx.stroke();
            ctx.strokeStyle = "#d6c8a7";
            ctx.beginPath();
            ctx.moveTo(6 * depthScale, -5 * depthScale);
            ctx.lineTo(6 * depthScale, 5 * depthScale);
            ctx.stroke();
            ctx.restore();
          } else {
            // Schwert in der rechten Hand
            const swordHandX = enemy.x + enemy.facing * 8.5 * depthScale;
            const swordHandY = enemy.y + 4 + armSwing * 0.9;
            const swordAngle = (enemy.facing < 0 ? Math.PI : 0) + swing * 0.75;
            ctx.save();
            ctx.translate(swordHandX, swordHandY);
            ctx.rotate(swordAngle);
            ctx.fillStyle = "#7a4f25";
            ctx.fillRect(-1.3 * depthScale, -1.2 * depthScale, 4 * depthScale, 2.4 * depthScale);
            ctx.fillStyle = COLORS.steel;
            ctx.beginPath();
            ctx.moveTo(2.6 * depthScale, -1.6 * depthScale);
            ctx.lineTo(13 * depthScale, -1.6 * depthScale);
            ctx.lineTo(16 * depthScale, 0);
            ctx.lineTo(13 * depthScale, 1.6 * depthScale);
            ctx.lineTo(2.6 * depthScale, 1.6 * depthScale);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = COLORS.steelDark;
            ctx.fillRect(2.6 * depthScale, -0.35 * depthScale, 10 * depthScale, 0.7 * depthScale);
            ctx.restore();
          }
        }
      }

      function drawArrows(projectiles = arrows, enemyShot = false) {
        for (const arrow of projectiles) {
          const angle = Math.atan2(arrow.dy, arrow.dx);
          const depthScale = 0.9 + (arrow.y / WORLD_H) * 0.24;

          ctx.save();
          ctx.translate(arrow.x, arrow.y);
          ctx.rotate(angle);

          ctx.fillStyle = enemyShot ? "#f2ad77" : COLORS.arrow;
          ctx.fillRect(-8 * depthScale, -1.5 * depthScale, 16 * depthScale, 3 * depthScale);
          ctx.fillStyle = enemyShot ? "#ffe4d2" : "#efefef";
          ctx.beginPath();
          ctx.moveTo(8 * depthScale, 0);
          ctx.lineTo(13 * depthScale, -3 * depthScale);
          ctx.lineTo(13 * depthScale, 3 * depthScale);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = enemyShot ? "#8c2e2e" : "#7b5b2c";
          ctx.beginPath();
          ctx.moveTo(-8 * depthScale, 0);
          ctx.lineTo(-12 * depthScale, -3 * depthScale);
          ctx.lineTo(-12 * depthScale, 3 * depthScale);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPlayer() {
        const flicker = invulnerableTimer > 0 && Math.floor(invulnerableTimer * 20) % 2 === 0;
        if (!flicker) {
          const depthScale = 0.91 + (player.y / WORLD_H) * 0.24;
          ctx.fillStyle = COLORS.shadow;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y + 10 * depthScale, 12 * depthScale, 6 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COLORS.linkPants;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y + 5 * depthScale, 8 * depthScale, 6 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.linkTunic;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y + depthScale, 10 * depthScale, 8 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.linkSleeve;
          ctx.beginPath();
          ctx.ellipse(player.x - 7 * depthScale, player.y + 2, 3.2 * depthScale, 2.4 * depthScale, -0.3, 0, Math.PI * 2);
          ctx.ellipse(player.x + 7 * depthScale, player.y + 2, 3.2 * depthScale, 2.4 * depthScale, 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.link;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y - 5 * depthScale, 6 * depthScale, 5.5 * depthScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = COLORS.linkHair;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y - 9.5 * depthScale, 5.8 * depthScale, 2.8 * depthScale, 0, 0, Math.PI * 2);
          ctx.ellipse(player.x - 5 * depthScale, player.y - 6 * depthScale, 3 * depthScale, 3 * depthScale, 0, 0, Math.PI * 2);
          ctx.ellipse(player.x + 5 * depthScale, player.y - 6 * depthScale, 3 * depthScale, 3 * depthScale, 0, 0, Math.PI * 2);
          ctx.ellipse(player.x - 7.2 * depthScale, player.y - 4.5 * depthScale, 1.6 * depthScale, 2.8 * depthScale, -0.2, 0, Math.PI * 2);
          ctx.ellipse(player.x + 7.2 * depthScale, player.y - 4.5 * depthScale, 1.6 * depthScale, 2.8 * depthScale, 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#cde3ff";
          ctx.fillRect(player.x - 2.5 * depthScale, player.y - 6.8 * depthScale, 1.2 * depthScale, 1.2 * depthScale);
          ctx.fillRect(player.x + 1.4 * depthScale, player.y - 6.8 * depthScale, 1.2 * depthScale, 1.2 * depthScale);

          if (swordDrawn) {
            drawBowOnBack(depthScale);
          } else {
            drawBowInHand(depthScale);
          }

          if (player.hasSword && !swordDrawn) {
            drawSwordOnBack(depthScale);
          }

          if (player.hasSword && swordDrawn) {
            const dirAngle =
              player.dir === "up"
                ? -Math.PI / 2
                : player.dir === "down"
                  ? Math.PI / 2
                  : player.dir === "left"
                    ? Math.PI
                    : 0;
            const slashAngle = swordSlashTimer > 0 ? Math.sin(swordSlashTimer * 35) * 0.8 : 0;
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(dirAngle + slashAngle);
            const bladeGrad = ctx.createLinearGradient(6, -2.2, 28, 2.2);
            bladeGrad.addColorStop(0, "#ecf5ff");
            bladeGrad.addColorStop(1, "#b5c8dd");
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(6, -2.1);
            ctx.lineTo(24.4, -2.1);
            ctx.lineTo(28, 0);
            ctx.lineTo(24.4, 2.1);
            ctx.lineTo(6, 2.1);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#7a91d6";
            ctx.beginPath();
            ctx.moveTo(4.7, -4.2);
            ctx.lineTo(7.8, -2.2);
            ctx.lineTo(7.8, 2.2);
            ctx.lineTo(4.7, 4.2);
            ctx.lineTo(2.7, 2.2);
            ctx.lineTo(2.7, -2.2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#4760b4";
            ctx.fillRect(1, -1.2, 2, 2.4);
            ctx.fillStyle = "#f7dc86";
            ctx.beginPath();
            ctx.moveTo(6.2, 0);
            ctx.lineTo(7, -0.8);
            ctx.lineTo(7.8, 0);
            ctx.lineTo(7, 0.8);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        }
      }

      function drawBowInHand(depthScale) {
        const bowAngle =
          player.dir === "up" ? -Math.PI / 2 : player.dir === "down" ? Math.PI / 2 : player.dir === "left" ? Math.PI : 0;
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(bowAngle);
        ctx.strokeStyle = "#8e5f2a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(7, 0, 6, -1.25, 1.25);
        ctx.stroke();
        ctx.strokeStyle = "#d6c8a7";
        ctx.beginPath();
        ctx.moveTo(9, -5.6);
        ctx.lineTo(9, 5.6);
        ctx.stroke();
        ctx.restore();
      }

      function drawBowOnBack(depthScale) {
        ctx.save();
        ctx.translate(player.x - 2 * depthScale, player.y - 1 * depthScale);
        ctx.rotate(-0.8);
        ctx.strokeStyle = "#8e5f2a";
        ctx.lineWidth = 1.7;
        ctx.beginPath();
        ctx.arc(0, 0, 7 * depthScale, -1.25, 1.25);
        ctx.stroke();
        ctx.strokeStyle = "#d6c8a7";
        ctx.beginPath();
        ctx.moveTo(2 * depthScale, -6 * depthScale);
        ctx.lineTo(2 * depthScale, 6 * depthScale);
        ctx.stroke();
        ctx.restore();
      }

      function drawSwordOnBack(depthScale) {
        ctx.save();
        ctx.translate(player.x + 5 * depthScale, player.y - 2 * depthScale);
        ctx.rotate(0.65);
        ctx.fillStyle = "#d6e5f3";
        ctx.fillRect(-1.3 * depthScale, -10 * depthScale, 2.6 * depthScale, 11 * depthScale);
        ctx.fillStyle = "#6982d5";
        ctx.fillRect(-3.6 * depthScale, 0.2 * depthScale, 7.2 * depthScale, 2.2 * depthScale);
        ctx.fillStyle = "#4760b4";
        ctx.fillRect(-1.2 * depthScale, 2.4 * depthScale, 2.4 * depthScale, 4.8 * depthScale);
        ctx.restore();
      }

      function drawOverlay() {
        if (!gameOver && !win) return;

        const darkness = gameOver ? Math.min(0.85, 0.35 + endStateTimer * 0.24) : 0.5;
        ctx.fillStyle = `rgba(5, 8, 12, ${darkness})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 34px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText(win ? "SIEG!" : "GAME OVER", canvas.width / 2, canvas.height / 2 - 12);

        ctx.font = "18px Segoe UI";
        ctx.fillText("Drücke R für Neustart", canvas.width / 2, canvas.height / 2 + 24);
      }

      function update(dt) {
        worldTime += dt;

        if (gameOver || win) {
          updateEndEffects(dt);
          return;
        }

        if (invulnerableTimer > 0) invulnerableTimer -= dt;
        if (shootCooldown > 0) shootCooldown -= dt;
        if (swordSlashTimer > 0) swordSlashTimer -= dt;

        updatePlayer(dt);
        updateArrows(dt);
        updateEnemyArrows(dt);
        updateEnemies(dt);
        updateRupees();
        updateSwordPickup();
        updateShopStations(dt);
        if (!inShop && player.rupees === MAX_RUPEES && enemies.every((enemy) => !enemy.alive)) {
          setMessage("Alle Bokoblins besiegt! Betritt jetzt den Tempel für das nächste Level.");
        }
        checkTempleWin();
        updateHud();
      }

      function render() {
        drawMap();
        drawShopStations();
        drawShopNpc();
        drawRupees();
        drawSwordPickup();
        drawEnemies();
        drawArrows();
        drawArrows(enemyArrows, true);
        drawPlayer();
        drawEndParticles();
        drawOverlay();
      }

      let last = performance.now();
      function gameLoop(ts) {
        const dt = Math.min((ts - last) / 1000, 0.033);
        last = ts;

        update(dt);
        render();

        requestAnimationFrame(gameLoop);
      }

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "f", "r"].includes(key)) {
          event.preventDefault();
        }

        if (key === " ") {
          if (!gameOver && !win && shootCooldown <= 0) shootArrow();
          return;
        }

        if (key === "r") {
          resetGame();
          return;
        }

        if (key === "f") {
          toggleSwordMode();
          return;
        }


        keyState.add(key);
      });

      window.addEventListener("keyup", (event) => {
        keyState.delete(event.key.toLowerCase());
      });

      resetGame();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
